<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>ChaosCore Overlay</title>

    <style>
        /* ============================================================
           BASE
        ============================================================ */

        body {
            margin: 0;
            overflow: hidden;
            background: transparent;
            font-family: Arial, sans-serif;
        }

        /* ============================================================
           BANDEAU OVERLAY
        ============================================================ */

        #ticker {
            position: fixed;
            bottom: 0;
            left: 0;

            width: 100%;
            height: 46px;

            display: none;
            align-items: center;

            overflow: hidden;

            background: rgba(0, 0, 0, 0.92);
            border-top: 3px solid #9b5cff;
        }

        #ticker.visible {
            display: flex;
        }

        /* ============================================================
           TEXTE DÉFILANT
        ============================================================ */

        #track {
            padding-left: 100%;

            white-space: nowrap;
            color: white;
            font-size: 24px;
            font-weight: bold;

            animation: scrollText 35s linear infinite;
        }

        @keyframes scrollText {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-100%);
            }
        }
    </style>
</head>

<body>
    <!-- ============================================================
         BANDEAU
    ============================================================ -->

    <div id="ticker">
        <div id="track"></div>
    </div>

    <script>
        // ============================================================
        // ÉLÉMENTS DOM
        // ============================================================

        const ticker = document.getElementById('ticker');
        const track = document.getElementById('track');

        // ============================================================
        // FORMATAGE
        // ============================================================

        function formatItem(item) {
            const title = item.rewardName || 'Chaos';
            const text = item.userInput || '';

            return `${title} ${text}`.trim();
        }

        // ============================================================
        // RAFRAÎCHISSEMENT OVERLAY
        // ============================================================

        async function refreshOverlay() {
            try {
                const response = await fetch(`/overlay/latest?t=${Date.now()}`, {
                    cache: 'no-store',
                });

                const data = await response.json();

                if (!data.active || !data.items || data.items.length === 0) {
                    hideOverlay();
                    return;
                }

                const message = data.items
                    .map(formatItem)
                    .join('   -   ');

                track.innerText = `${message}   -   ${message}`;
                ticker.classList.add('visible');
            } catch (error) {
                hideOverlay();
            }
        }

        function hideOverlay() {
            ticker.classList.remove('visible');
            track.innerText = '';
        }

        // ============================================================
        // LANCEMENT
        // ============================================================

        refreshOverlay();
        setInterval(refreshOverlay, 3000);
    </script>
</body>
</html>
